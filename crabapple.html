nfo-item"><strong>💬 花语</strong><span>温和、美丽、离愁</span></div><div class="info-item"><strong>🌸 花期</strong><span>4月 – 5月</span></div></div><p>海棠花姿潇洒，花开似锦，自古以来是雅俗共赏的名花，有“花中神仙”“花贵妃”之称。苏轼诗“只恐夜深花睡去，故烧高烛照红妆”便是咏海棠。</p ><div class="poem">📜 李清照《如梦令》—— “试问卷帘人，却道海棠依旧。知否？知否？应是绿肥红瘦。”</div><p><strong>🌱 品种：</strong> 西府海棠、垂丝海棠、贴梗海棠等。海棠果亦可食用或制作果酱。</p ><div class="back-home"><a href=" " class="btn-home">🏠 返回首页</a ></div></div><div class="footer-links"><a href="index.html">首页</a ><a href="cherry.html">樱花</a ><a href="peach.html">桃花</a ><a href="tulip.html">郁金香</a ><a href="magnolia.html">玉兰</a ><a href="peony.html">牡丹</a ><a href="azalea.html">杜鹃</a ><a href="rapeseed.html">油菜花</a ></div><div style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color:#8b765a;">© 春日花鉴 · 未公开发表 仅供鉴赏</div></div></body></html>
