<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>玉兰 · 冰清玉洁 | 春日花鉴</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Roboto,sans-serif;background:#fef9f0;color:#2c3e2f;}.container{max-width:1000px;margin:0 auto;padding:1.5rem;}.header{text-align:center;padding-bottom:1rem;border-bottom:2px solid #e9d6b0;margin-bottom:1.5rem;}.header h1{font-size:2.2rem;background:linear-gradient(135deg,#5b8c5a,#c97e5a);background-clip:text;-webkit-background-clip:text;color:transparent;}.detail-main{background:#fffcf5;border-radius:2rem;padding:2rem;box-shadow:0 12px 30px rgba(0,0,0,0.05);}.flower-title{font-size:2.5rem;border-left:8px solid #f3a683;padding-left:1rem;margin-bottom:1rem;color:#4f6d3c;}.flower-sub{display:flex;flex-wrap:wrap;gap:2rem;background:#fdf6e8;padding:1.2rem;border-radius:1.5rem;margin:1.5rem 0;}.info-item{flex:1;min-width:150px;}.info-item strong{color:#b1623a;display:block;}.poem{background:#f2ede0;padding:1rem 1.5rem;border-radius:1.2rem;font-style:italic;margin:1.2rem 0;color:#7a5a44;}.back-home{margin-top:2rem;text-align:center;}.btn-home{background:#d9c49b;padding:0.6rem 1.5rem;border-radius:40px;text-decoration:none;color:#3e4d2e;font-weight:bold;display:inline-block;}.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:0.8rem;margin-top:2rem;padding-top:1rem;border-top:1px solid #eadbba;}.footer-links a{text-decoration:none;color:#6f5a3e;background:#fbf3e3;padding:0.2rem 0.8rem;border-radius:30px;font-size:0.85rem;}@media (max-width:600px){.flower-title{font-size:1.8rem;}}</style></head><body><div class="container"><div class="header"><h1>🌸 春日花鉴 · 百花风雅录</h1></div><div class="detail-main"><div class="flower-title">🤍 玉兰 · 冰清玉洁</div><div class="flower-sub"><div class="info-item"><strong>📖 学名</strong><span>Magnolia denudata</span></div><div class="info-item"><strong>🌿 科属</strong><span>木兰科 · 木兰属</span></div><div class="info-item"><strong>💬 花语</strong><span>纯洁、真挚、报恩</span></div><div class="info-item"><strong>🌸 花期</strong><span>早春2-3月（先花后叶）</span></div></div><p>玉兰花大而洁白，芳香馥郁，开放时满树无叶，纯粹如雪。古代常植于庭院，寓意“金玉满堂”。屈原《离骚》中“朝搴阰之木兰兮”即指玉兰一类。</p ><div class="poem">📜 明代 睦石《玉兰》—— “霓裳片片晚妆新，束素亭亭玉殿春。已向丹霞生浅晕，故将清露作芳尘。”</div><p><strong>🌳 栽培价值：</strong> 玉兰耐寒，喜光，是优良的园林观赏树。白玉兰也是上海市的市花。</p ><div class="back-home"><a href=" " class="btn-home">🏠 返回首页</a ></div></div><div class="footer-links"><a href="index.html">首页</a ><a href="cherry.html">樱花</a ><a href="peach.html">桃花</a ><a href="tulip.html">郁金香</a ><a href="crabapple.html">海棠</a ><a href="peony.html">牡丹</a ><a href="azalea.html">杜鹃</a ><a href="rapeseed.html">油菜花</a ></div><div style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color:#8b765a;">© 春日花鉴 · 未公开发表 仅供鉴赏</div></div></body></html>
